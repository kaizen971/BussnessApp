<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BussnessApp - Back Office d'administration et gestion des abonnements" />
    <meta name="theme-color" content="#0f0f20" />
    <title>BussnessApp - Back Office</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background: #f8f9fb; }
      #app-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #f8f9fb; z-index: 9999; transition: opacity 0.3s;
      }
      #app-loader .logo {
        width: 48px; height: 48px; background: linear-gradient(135deg, #8b83ff, #6C63FF);
        border-radius: 16px; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 24px -4px rgba(108, 99, 255, 0.25);
        animation: loaderPulse 1.5s ease-in-out infinite;
      }
      #app-loader .spinner {
        width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3);
        border-top-color: white; border-radius: 50%; animation: loaderSpin 0.8s linear infinite;
      }
      @keyframes loaderSpin { to { transform: rotate(360deg); } }
      @keyframes loaderPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
    <script type="module" crossorigin src="/assets/index-C0501osA.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CzLKPXiQ.css">
  </head>
  <body>
    <div id="app-loader"><div class="logo"><div class="spinner"></div></div></div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) { loader.style.opacity = '0'; setTimeout(function() { loader.remove(); }, 300); }
        }, 200);
      });
    </script>
  </body>
